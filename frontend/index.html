<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SL2Text — Nhận Diện Ngôn Ngữ Ký Hiệu</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>🤟 SL2Text</h1>
        <p>Nhận diện ngôn ngữ ký hiệu tiếng Việt → Văn bản &amp; Giọng nói</p>
    </header>

    <main>
        <!-- ── Video Preview ─────────────────────────────── -->
        <section class="video-section">
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="overlay"></canvas>
                <div id="status-badge" class="badge disconnected">Chưa kết nối</div>
            </div>
            <div class="controls">
                <button id="btn-start" class="btn btn-primary">▶ Bắt đầu</button>
                <button id="btn-stop"  class="btn btn-danger" disabled>⏹ Dừng</button>
            </div>
        </section>

        <!-- ── Output ────────────────────────────────────── -->
        <section class="output-section">
            <h2>Kết quả nhận diện</h2>
            <div id="text-output" class="text-box">
                <p class="placeholder">Kết quả sẽ hiển thị ở đây...</p>
            </div>
            <div class="stats">
                <span id="stat-fps">FPS: --</span>
                <span id="stat-latency">Latency: -- ms</span>
                <span id="stat-frames">Frames: 0</span>
            </div>
        </section>
    </main>

    <!-- Audio player ẩn -->
    <audio id="audio-player" style="display:none"></audio>

    <!-- MediaPipe Vision Tasks -->
    <script type="module" src="app.js"></script>
</body>
</html>
